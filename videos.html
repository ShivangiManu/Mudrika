<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mudrika - Video Lectures</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Styles for clickable username */
    .user-profile-link {
      color: white;
      text-decoration: none;
      margin-right: 5px;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-weight: 500;
      cursor: pointer;
    }
    .user-profile-link:hover {
      transform: translateY(-2px);
      text-shadow: 0 2px 5px rgba(0,0,0,0.2);
      text-decoration: underline;
    }
    .user-profile-link.guest-mode {
      opacity: 0.7;
      cursor: not-allowed;
      text-decoration: none;
    }
    .user-profile-link.guest-mode:hover {
      transform: none;
      text-decoration: none;
    }
  </style>
</head>
<body>

<nav class="navbar">
  <div style="display:flex;align-items:center;gap:10px;">
    <img src="assets/logo.png" alt="Mudrika Logo" style="height:45px;border-radius:50%;">
    <h2 style="margin:0;color:#FFFFFF;">Mudrika</h2>
  </div>
  <div>
    <a href="index.html" class="nav-btn">Home</a>
    <a href="progress.html" class="nav-btn">Progress</a>
    <!-- CLICKABLE USERNAME LINK -->
    <a href="#" id="userProfileLink" class="user-profile-link">
      <span id="userDisplay" style="color:white; margin-right:10px;"></span>
    </a>
  </div>
</nav>

<section class="hero" style="padding-bottom:20px;">
  <h2>ISL Video Dictionary</h2>
  <p style="color:#6B5044;max-width:500px;margin:0 auto;">
    Browse Indian Sign Language signs by letter. Click any word to watch the sign video.
  </p>
  <div style="margin-top:20px;">
    <input type="text" id="searchInput" placeholder="Search a word... e.g. Apple" oninput="searchWords()"
      style="width:100%;max-width:400px;padding:12px 20px;border-radius:25px;border:2px solid #D8BFA8;font-size:1rem;font-family:'Poppins',sans-serif;background:#FFF9F2;outline:none;">
  </div>
  <div id="letterLinks" style="margin-top:20px;display:flex;flex-wrap:wrap;justify-content:center;gap:8px;">
    <span style="font-size:0.85rem;color:#6B5044;align-self:center;">Jump to:</span>
  </div>
</section>

<div id="videoWordsContainer" style="padding:20px 40px 60px;"></div>
<div id="searchResults" style="display:none;padding:20px 40px 60px;"></div>

<!-- VIDEO MODAL -->
<div id="videoModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:9999;justify-content:center;align-items:center;padding:20px;">
  <div style="background:#FFF9F2;border-radius:20px;padding:24px;max-width:680px;width:100%;position:relative;box-shadow:0 20px 60px rgba(0,0,0,0.4);">
    <button onclick="closeModal()" style="position:absolute;top:14px;right:16px;background:#C65A3A;color:white;border:none;border-radius:50%;width:32px;height:32px;font-size:1rem;cursor:pointer;">✕</button>
    <h2 id="modalTitle" style="font-family:'Cinzel',serif;color:#C65A3A;margin:0 0 16px;font-size:1.5rem;"></h2>
    <div style="position:relative;padding-bottom:56.25%;height:0;overflow:hidden;border-radius:12px;">
      <iframe id="modalIframe" src="" style="position:absolute;top:0;left:0;width:100%;height:100%;border:none;border-radius:12px;" allow="autoplay;encrypted-media" allowfullscreen></iframe>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/auth.js"></script>
<script src="js/video.js"></script>

<script>
// Add user display to navbar
document.addEventListener('DOMContentLoaded', function() {
    const userDisplay = document.getElementById('userDisplay');
    const userProfileLink = document.getElementById('userProfileLink');
    const loginLogoutBtn = document.getElementById('loginLogoutBtn');
    const signupBtn = document.getElementById('signupBtn');
    
    // Function to update profile link based on user state
    function updateProfileLink(user, isGuest) {
      if (!userProfileLink) return;
      
      if (user) {
        userProfileLink.href = "profile.html";
        userProfileLink.classList.remove('guest-mode');
        userProfileLink.style.pointerEvents = "auto";
        userProfileLink.style.opacity = "1";
        userProfileLink.style.cursor = "pointer";
      } else if (isGuest) {
        userProfileLink.href = "javascript:void(0);";
        userProfileLink.classList.add('guest-mode');
        userProfileLink.style.pointerEvents = "none";
        userProfileLink.style.opacity = "0.7";
        userProfileLink.style.cursor = "not-allowed";
        userProfileLink.title = "Please login to access profile";
      } else {
        userProfileLink.href = "javascript:void(0);";
        userProfileLink.classList.add('guest-mode');
        userProfileLink.style.pointerEvents = "none";
        userProfileLink.style.opacity = "0.7";
        userProfileLink.style.cursor = "not-allowed";
        userProfileLink.title = "Please login to access profile";
      }
    }
    
    if (typeof auth !== 'undefined') {
        auth.onAuthStateChanged(function(user) {
            if (user) {
                const username = localStorage.getItem('mudrika_username') || user.email.split('@')[0];
                if (userDisplay) userDisplay.innerHTML = username;
                updateProfileLink(user, false);
                if (loginLogoutBtn) {
                    loginLogoutBtn.innerHTML = 'Logout';
                    loginLogoutBtn.href = '#';
                    loginLogoutBtn.onclick = function(e) {
                        e.preventDefault();
                        if (typeof logout !== 'undefined') logout();
                    };
                }
                if (signupBtn) signupBtn.style.display = 'none';
            } else {
                const guestName = localStorage.getItem('mudrika_username');
                const isGuest = (guestName === 'Guest User');
                if (userDisplay) userDisplay.innerHTML = isGuest ? 'Guest' : '';
                updateProfileLink(null, isGuest);
                if (loginLogoutBtn) {
                    loginLogoutBtn.innerHTML = 'Login';
                    loginLogoutBtn.href = 'login.html';
                    loginLogoutBtn.onclick = null;
                }
                if (signupBtn) signupBtn.style.display = 'inline-block';
            }
        });
    }
    
    // Add click handler for profile link
    if (userProfileLink) {
      userProfileLink.addEventListener('click', function(e) {
        const href = userProfileLink.getAttribute('href');
        if (href === 'javascript:void(0);' || href === '#') {
          e.preventDefault();
          const isGuest = localStorage.getItem('mudrika_username') === 'Guest User';
          if (isGuest || !auth.currentUser) {
            alert('Please login to access your profile page.');
          }
          return false;
        }
        return true;
      });
    }
});
</script>

</body>
</html>

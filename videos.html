// Build letter sections
var container = document.getElementById("videoWordsContainer");
var linkContainer = document.getElementById("letterLinks");

Object.keys(videoData).forEach(function(letter) {

  // Jump link
  var a = document.createElement("a");
  a.href = "#section-" + letter;
  a.textContent = letter;
  a.style.cssText = "background:#FFF9F2;border:2px solid #D8BFA8;color:#C65A3A;font-weight:700;padding:4px 10px;border-radius:10px;text-decoration:none;font-size:0.85rem;";
  linkContainer.appendChild(a);

  // Section
  var section = document.createElement("div");
  section.id = "section-" + letter;
  section.style.cssText = "margin-bottom:40px;scroll-margin-top:80px;";

  // Heading
  var h2 = document.createElement("h2");
  h2.textContent = letter;
  h2.style.cssText = "font-family:'Cinzel',serif;color:#C65A3A;font-size:1.8rem;border-bottom:2px solid #F2B36D;padding-bottom:8px;margin-bottom:16px;";
  section.appendChild(h2);

  // Word chips
  videoData[letter].forEach(function(item) {
    var btn = document.createElement("button");
    btn.textContent = item.word;
    btn.style.cssText = "background:#FFF9F2;color:#3A2E2A;border:2px solid #D8BFA8;padding:8px 18px;border-radius:20px;font-family:'Poppins',sans-serif;font-size:0.9rem;cursor:pointer;margin:5px;transition:all 0.2s;";
    btn.onmouseover = function(){ btn.style.background="#C65A3A"; btn.style.color="#fff"; btn.style.borderColor="#C65A3A"; };
    btn.onmouseout  = function(){ btn.style.background="#FFF9F2"; btn.style.color="#3A2E2A"; btn.style.borderColor="#D8BFA8"; };
    btn.onclick = function(){ openModal(item.word, item.id); };
    section.appendChild(btn);
  });

  container.appendChild(section);
});

// Open modal
function openModal(word, ytId) {
  document.getElementById("modalTitle").textContent = word;
  document.getElementById("modalIframe").src = "https://www.youtube.com/embed/" + ytId + "?autoplay=1";
  document.getElementById("videoModal").style.display = "flex";
}

// Close modal
function closeModal() {
  document.getElementById("videoModal").style.display = "none";
  document.getElementById("modalIframe").src = "";
}

// Close on backdrop click
document.getElementById("videoModal").addEventListener("click", function(e){
  if (e.target === this) closeModal();
});

// Close on Escape
document.addEventListener("keydown", function(e){
  if (e.key === "Escape") closeModal();
});

// Search
function searchWords() {
  var query = document.getElementById("searchInput").value.trim().toLowerCase();
  var mainDiv = document.getElementById("videoWordsContainer");
  var searchDiv = document.getElementById("searchResults");

  if (!query) {
    mainDiv.style.display = "block";
    searchDiv.style.display = "none";
    searchDiv.innerHTML = "";
    return;
  }

  mainDiv.style.display = "none";
  searchDiv.style.display = "block";
  searchDiv.innerHTML = "";

  var found = [];
  Object.keys(videoData).forEach(function(letter){
    videoData[letter].forEach(function(item){
      if (item.word.toLowerCase().indexOf(query) !== -1) found.push(item);
    });
  });

  if (found.length === 0) {
    searchDiv.innerHTML = "<p style='text-align:center;color:#6B5044;'>No results found for <strong>" + query + "</strong></p>";
    return;
  }

  var info = document.createElement("p");
  info.style.cssText = "color:#6B5044;font-size:0.9rem;margin-bottom:16px;";
  info.textContent = found.length + " result(s) found";
  searchDiv.appendChild(info);

  found.forEach(function(item){
    var btn = document.createElement("button");
    btn.textContent = item.word;
    btn.style.cssText = "background:#FFF9F2;color:#3A2E2A;border:2px solid #D8BFA8;padding:8px 18px;border-radius:20px;font-family:'Poppins',sans-serif;font-size:0.9rem;cursor:pointer;margin:5px;";
    btn.onmouseover = function(){ btn.style.background="#C65A3A"; btn.style.color="#fff"; };
    btn.onmouseout  = function(){ btn.style.background="#FFF9F2"; btn.style.color="#3A2E2A"; };
    btn.onclick = function(){ openModal(item.word, item.id); };
    searchDiv.appendChild(btn);
  });
}

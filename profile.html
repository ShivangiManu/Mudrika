<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mudrika - User Profile</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        .profile-container {
            max-width: 800px;
            margin: 40px auto;
            background: #FFF9F2;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .profile-header {
            background: linear-gradient(135deg, #C65A3A, #F2B36D);
            padding: 40px;
            text-align: center;
            color: white;
        }
        .profile-pic {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid white;
            margin-bottom: 15px;
            background: #F6E2CC;
        }
        .profile-info {
            padding: 30px;
        }
        .info-group {
            margin-bottom: 25px;
            border-bottom: 1px solid #D8BFA8;
            padding-bottom: 15px;
        }
        .info-label {
            font-weight: 600;
            color: #C65A3A;
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }
        .info-value {
            font-size: 1.1rem;
            color: #3A2E2A;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .edit-btn, .verify-btn, .save-btn, .cancel-btn {
            background: #355C7D;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s;
        }
        .verify-btn {
            background: #4CAF50;
        }
        .verify-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .save-btn {
            background: #4CAF50;
        }
        .cancel-btn {
            background: #888;
        }
        .edit-input {
            padding: 8px 12px;
            border: 1px solid #D8BFA8;
            border-radius: 20px;
            font-family: 'Poppins', sans-serif;
            width: 200px;
        }
        .profile-actions {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }
        .message {
            text-align: center;
            padding: 10px;
            margin-top: 10px;
            border-radius: 20px;
            font-size: 0.9rem;
        }
        .message.success {
            background: #e8f5e9;
            color: #2e7d32;
        }
        .message.error {
            background: #ffebee;
            color: #c62828;
        }
        .hidden {
            display: none;
        }
        .upload-btn {
            background: #FFF9F2;
            color: #C65A3A;
            border: 2px solid #C65A3A;
            padding: 5px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
            margin-top: 10px;
            display: inline-block;
        }
        .upload-btn:hover {
            background: #C65A3A;
            color: white;
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div style="display:flex;align-items:center;gap:10px;">
        <img src="assets/logo.png" alt="Mudrika Logo" style="height:45px; border-radius: 50%;">
        <h2 style="margin:0; color:#FFFFFF;">Mudrika</h2>
    </div>
    <div>
        <a href="index.html" class="nav-btn">Home</a>
        <a href="progress.html" class="nav-btn">Progress</a>
        <a href="videos.html" class="nav-btn">Lectures</a>
        <span id="userDisplay" style="color:white; margin-right:10px;"></span>
        <a href="#" id="logoutBtn" class="nav-btn">Logout</a>
    </div>
</nav>

<div class="profile-container">
    <div class="profile-header">
        <img id="profileImage" src="assets/default-avatar.png" alt="Profile" class="profile-pic">
        <h2 id="userNameDisplay">Loading...</h2>
        <p id="userEmailDisplay"></p>
        <input type="file" id="profilePicUpload" accept="image/*" style="display: none;">
        <button id="uploadPicBtn" class="upload-btn">📷 Change Photo</button>
    </div>

    <div class="profile-info">
        <div class="info-group">
            <span class="info-label">Display Name</span>
            <div id="nameDisplay" class="info-value">
                <span id="displayNameText">-</span>
                <button id="editNameBtn" class="edit-btn">Edit</button>
            </div>
            <div id="nameEdit" class="info-value hidden">
                <input type="text" id="editNameInput" class="edit-input" placeholder="Enter your name">
                <div>
                    <button id="saveNameBtn" class="save-btn">Save</button>
                    <button id="cancelNameBtn" class="cancel-btn">Cancel</button>
                </div>
            </div>
        </div>

        <div class="info-group">
            <span class="info-label">Email Address</span>
            <div class="info-value">
                <span id="userEmailValue">-</span>
                <button id="verifyEmailBtn" class="verify-btn">Verify Email</button>
            </div>
            <div id="emailStatus" class="message" style="margin-top: 8px;"></div>
        </div>

        <div class="info-group">
            <span class="info-label">Account Created</span>
            <div class="info-value">
                <span id="accountCreated">-</span>
            </div>
        </div>

        <div class="profile-actions">
            <a href="index.html" class="start-btn" style="background:#355C7D;">Back to Home</a>
        </div>

        <div id="profileMessage" class="message hidden"></div>
    </div>
</div>

<footer style="background: linear-gradient(to right, #C65A3A, #F2B36D); color: white; text-align: center; padding: 20px; margin-top: 50px;">
    <p style="margin: 0;">© 2024 Mudrika - Learn Indian Sign Language</p>
</footer>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/auth.js"></script>
<script src="js/firestore-helpers.js"></script>
<script src="js/profile.js"></script>

</body>
</html>

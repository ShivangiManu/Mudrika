<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mudrika - Quiz</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Styles for clickable username */
    .user-profile-link {
      color: white;
      text-decoration: none;
      margin-right: 5px;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-weight: 500;
      cursor: pointer;
    }
    .user-profile-link:hover {
      transform: translateY(-2px);
      text-shadow: 0 2px 5px rgba(0,0,0,0.2);
      text-decoration: underline;
    }
    .user-profile-link.guest-mode {
      opacity: 0.7;
      cursor: not-allowed;
      text-decoration: none;
    }
    .user-profile-link.guest-mode:hover {
      transform: none;
      text-decoration: none;
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <h2>Mudrika</h2>
    <div>
      <a href="index.html" class="nav-btn">Home</a>
      <a href="videos.html" class="nav-btn">Lectures</a>
      <a href="progress.html" class="nav-btn">Progress</a>

      <a href="#" id="userProfileLink" class="user-profile-link">
        <span id="userDisplay" style="color:white; margin-right:10px;"></span>
      </a>
    </div>
  </nav>

  <section class="hero" id="quizContainer">
    <!-- Quiz loads here -->
  </section>

  <div style="text-align:center;">
    <button onclick="submitQuiz()">Submit Quiz</button>
  </div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/firestore-helpers.js"></script>
  <script src="js/quiz.js"></script>

  <script>
  // User display and logout handling
  document.addEventListener('DOMContentLoaded', function() {
      const userDisplay = document.getElementById('userDisplay');
      const userProfileLink = document.getElementById('userProfileLink');
      const loginLogoutBtn = document.getElementById('loginLogoutBtn');
      const signupBtn = document.getElementById('signupBtn');
      
      // Function to update profile link based on user state
      function updateProfileLink(user, isGuest) {
        if (!userProfileLink) return;
        
        if (user) {
          userProfileLink.href = "profile.html";
          userProfileLink.classList.remove('guest-mode');
          userProfileLink.style.pointerEvents = "auto";
          userProfileLink.style.opacity = "1";
          userProfileLink.style.cursor = "pointer";
        } else if (isGuest) {
          userProfileLink.href = "javascript:void(0);";
          userProfileLink.classList.add('guest-mode');
          userProfileLink.style.pointerEvents = "none";
          userProfileLink.style.opacity = "0.7";
          userProfileLink.style.cursor = "not-allowed";
          userProfileLink.title = "Please login to access profile";
        } else {
          userProfileLink.href = "javascript:void(0);";
          userProfileLink.classList.add('guest-mode');
          userProfileLink.style.pointerEvents = "none";
          userProfileLink.style.opacity = "0.7";
          userProfileLink.style.cursor = "not-allowed";
          userProfileLink.title = "Please login to access profile";
        }
      }
      
      if (typeof auth !== 'undefined') {
          auth.onAuthStateChanged(function(user) {
              if (user) {
                  const username = localStorage.getItem('mudrika_username') || user.email.split('@')[0];
                  if (userDisplay) userDisplay.innerHTML = username;
                  updateProfileLink(user, false);
                  if (loginLogoutBtn) {
                      loginLogoutBtn.innerHTML = 'Logout';
                      loginLogoutBtn.href = '#';
                      loginLogoutBtn.onclick = function(e) {
                          e.preventDefault();
                          if (typeof logout !== 'undefined') logout();
                      };
                  }
                  if (signupBtn) signupBtn.style.display = 'none';
              } else {
                  const guestName = localStorage.getItem('mudrika_username');
                  const isGuest = (guestName === 'Guest User');
                  if (userDisplay) userDisplay.innerHTML = isGuest ? 'Guest' : '';
                  updateProfileLink(null, isGuest);
                  if (loginLogoutBtn) {
                      loginLogoutBtn.innerHTML = 'Login';
                      loginLogoutBtn.href = 'login.html';
                      loginLogoutBtn.onclick = null;
                  }
                  if (signupBtn) signupBtn.style.display = 'inline-block';
              }
          });
      }
      
      // Click handler for profile link
      if (userProfileLink) {
        userProfileLink.addEventListener('click', function(e) {
          const href = userProfileLink.getAttribute('href');
          if (href === 'javascript:void(0);' || href === '#') {
            e.preventDefault();
            const isGuest = localStorage.getItem('mudrika_username') === 'Guest User';
            if (isGuest || !auth.currentUser) {
              alert('Please login to access your profile page.');
            }
            return false;
          }
          return true;
        });
      }
  });
  </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Mudrika | Sign Up</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&display=swap" rel="stylesheet">
  
  <!-- 1. Firebase Core (the main library) -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <!-- 2. Firebase Authentication (for user login) -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <!-- 3. Your Firebase configuration (connects to project) -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>

</head>
<body>

<!-- BACK TO HOME LINK -->
<a href="index.html" style="
  position:absolute;
  top:20px;
  left:20px;
  text-decoration:none;
  font-weight:bold;
  color: darkblue;
">Home</a>

<div style="display:flex; height:100vh;">

  <!-- LEFT LOGO -->
  <div style="
    flex:1;
    background: linear-gradient(to bottom, #355C7D, #F2B36D);
    display:flex;
    justify-content:center;
    align-items:center;
  ">
   <img src="assets/logo.png" style="
  width:60%;
  border-radius: 50%;
">
  </div>

  <!-- RIGHT FORM -->
  <div style="
    flex:1;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
  ">
    <h2>Create your <span class="title">Mudrika</span> Account</h2>
    
    <input type="text" id="signup-username" placeholder="Username" style="width:80%; max-width:300px; margin:10px 0; padding:10px; border-radius:8px; border:1px solid #D8BFA8;">
    <input type="email" id="signup-email" placeholder="Email Address" style="width:80%; max-width:300px; margin:10px 0; padding:10px; border-radius:8px; border:1px solid #D8BFA8;">
    <input type="password" id="signup-password" placeholder="Password (min. 6 characters)" style="width:80%; max-width:300px; margin:10px 0; padding:10px; border-radius:8px; border:1px solid #D8BFA8;">

    <button onclick="signup()" style="background:#C65A3A; color:white; border:none; padding:10px 25px; border-radius:20px; cursor:pointer;">Sign Up</button>
    
    <p id="auth-msg" style="margin-top:10px;"></p>

    <p>Already have an account? <a href="login.html">Login</a></p>
  </div>

</div>

<script src="js/auth.js"></script>
</body>
</html>

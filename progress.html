<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mudrika - Progress</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav class="navbar">
    <h2>Mudrika</h2>
    <div>
      <a href="index.html" class="nav-btn">Home</a>
      <a href="videos.html" class="nav-btn">Lectures</a>
      <span id="userDisplay" style="color:white; margin-right:10px;"></span>
    </div>
  </nav>

  <section class="hero">
    <h2>Your Learning Progress</h2>
    <div id="progressContainer"></div>
  </section>

    <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <!-- 🔥 ADD FIRESTORE SDK 🔥 -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/firestore-helpers.js"></script>
  <script src="js/progress.js"></script>

  <script>
  // User display and logout handling
  document.addEventListener('DOMContentLoaded', function() {
      const userDisplay = document.getElementById('userDisplay');
      const loginLogoutBtn = document.getElementById('loginLogoutBtn');
      const signupBtn = document.getElementById('signupBtn');
      
      if (typeof auth !== 'undefined') {
          auth.onAuthStateChanged(function(user) {
              if (user) {
                  const username = localStorage.getItem('mudrika_username') || user.email.split('@')[0];
                  if (userDisplay) userDisplay.innerHTML = username;
                  if (loginLogoutBtn) {
                      loginLogoutBtn.innerHTML = 'Logout';
                      loginLogoutBtn.href = '#';
                      loginLogoutBtn.onclick = function(e) {
                          e.preventDefault();
                          if (typeof logout !== 'undefined') logout();
                      };
                  }
                  if (signupBtn) signupBtn.style.display = 'none';
              } else {
                  const guestName = localStorage.getItem('mudrika_username');
                  if (userDisplay) userDisplay.innerHTML = guestName === 'Guest User' ? 'Guest' : '';
                  if (loginLogoutBtn) {
                      loginLogoutBtn.innerHTML = 'Login';
                      loginLogoutBtn.href = 'login.html';
                      loginLogoutBtn.onclick = null;
                  }
                  if (signupBtn) signupBtn.style.display = 'inline-block';
              }
          });
      }
  });
  </script>
</body>
</html>
